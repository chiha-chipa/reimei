<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>単語帳 - ROO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; padding: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 16px; }

    .panel { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }

    /* ユーザーバー */
    #userBar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #userBar .user-info { font-size: 0.9rem; }
    .author-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
    .author-gray  { background:#eee; color:#555; }
    .author-blue  { background:#dbeafe; color:#1d4ed8; }
    .author-green { background:#dcfce7; color:#15803d; }
    .author-pink  { background:#fce7f3; color:#be185d; }

    /* 入力エリア */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-size: 0.8rem; color: #555; font-weight: bold; }
    .input, .select, .textarea {
      border: 1px solid #ccc; border-radius: 6px; padding: 6px 10px;
      font-size: 0.9rem; width: 100%; font-family: sans-serif;
    }
    .textarea { height: 80px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { outline: none; border-color: #6366f1; }

    /* ボタン */
    .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 0.875rem; }
    .btn:hover { background: #f0f0f0; }
    .btn.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
    .btn.primary:hover { background: #4f46e5; }
    .btn.danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn.danger:hover { background: #dc2626; }

    /* ツールバー */
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .search { flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .count { font-size: 0.85rem; color: #666; margin-left: auto; }

    /* カテゴリチップ */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { padding: 4px 12px; border-radius: 16px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 0.8rem; }
    .chip.active { background: #6366f1; color: #fff; border-color: #6366f1; }

    /* カード一覧 */
    .section-title { font-size: 1rem; font-weight: bold; color: #444; margin: 16px 0 8px; border-bottom: 2px solid #e5e7eb; padding-bottom: 4px; }
    .cards { display: flex; flex-direction: column; gap: 8px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-word { font-size: 1.1rem; font-weight: bold; }
    .card-tag { font-size: 0.75rem; background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 10px; }
    .card-body { margin-top: 6px; font-size: 0.875rem; color: #444; display: flex; flex-direction: column; gap: 2px; }
    .card-body span { color: #888; font-size: 0.8rem; }
    .card-note { margin-top: 6px; font-size: 0.85rem; color: #555; white-space: pre-wrap; }
    .card-footer { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
    .card-meta { font-size: 0.75rem; color: #aaa; }
    .card-actions { display: flex; gap: 6px; }

    /* ダイアログ */
    dialog { border: none; border-radius: 12px; padding: 0; max-width: 500px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    dialog::backdrop { background: rgba(0,0,0,0.4); }
    .dialog-panel { padding: 20px; }
    .dialog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .dialog-title { font-size: 1.1rem; font-weight: bold; }
    .close-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; line-height: 1; }
    .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

    /* 匿名チェック */
    .anon-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.875rem; }

    .status { font-size: 0.85rem; color: #6366f1; margin-top: 8px; }
    .error { color: #ef4444; }

    .notice { font-size: 0.8rem; color: #aaa; margin-top: 8px; }
  </style>
</head>
<body>

<h1>🗺️ 単語帳 - ROO</h1>
<p class="subtitle">見かけた単語や表現をみんなで集められます。意味がわからないものはワードだけでも残せます。</p>

<!-- ユーザーパネル -->
<div class="panel">
  <div id="userBar">
    <span id="userStatus" class="user-info">投稿・編集するにはサインインしてください</span>
    <button class="btn" id="signinBtn" type="button">サインイン / 新規登録</button>
  </div>
</div>

<!-- 投稿フォーム（サインイン後に表示） -->
<div class="panel" id="entryForm" style="display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <strong>新しいカードを追加</strong>
    <div class="anon-row">
      <input type="checkbox" id="anonCheck" />
      <label for="anonCheck">「神秘的な冒険者」として投稿</label>
    </div>
  </div>
  <div class="form-grid">
    <div class="field-group">
      <label class="field-label" for="wordInput">ワード *</label>
      <input class="input" id="wordInput" type="text" placeholder="例：HHH / NT / Freya" />
    </div>
    <div class="field-group">
      <label class="field-label" for="tagInput">タグ</label>
      <select class="select" id="tagInput">
        <option value="">選択してください</option>
        <option value="クエスト">クエスト</option>
        <option value="アイテム">アイテム</option>
        <option value="職業・ロール">職業・ロール</option>
        <option value="モンスター">モンスター</option>
        <option value="スキル">スキル</option>
        <option value="募集">募集</option>
        <option value="呼び名">呼び名</option>
        <option value="その他">その他</option>
      </select>
    </div>
  </div>
  <div class="form-grid">
    <div class="field-group">
      <label class="field-label" for="enInput">英語表記</label>
      <input class="input" id="enInput" type="text" placeholder="例：Helheim Hard" />
    </div>
    <div class="field-group">
      <label class="field-label" for="jpInput">日本語</label>
      <input class="input" id="jpInput" type="text" placeholder="例：ヘルヘイムの試練-ハード" />
    </div>
  </div>
  <div class="field-group" style="margin-bottom:12px;">
    <label class="field-label" for="aliasInput">Alias / 別表記</label>
    <input class="input" id="aliasInput" type="text" placeholder="例：HHH / Helheim Hard（/ で区切る）" />
  </div>
  <div class="field-group">
    <label class="field-label" for="noteInput">メモ</label>
    <textarea class="textarea" id="noteInput" placeholder="見かけた場所、聞いた意味、あとで確認したいことなど。調べかけでもOK！"></textarea>
  </div>
  <div class="form-actions">
    <button class="btn primary" id="addBtn" type="button">追加する</button>
  </div>
  <p id="addStatus" class="status"></p>
</div>

<!-- 検索・ソート -->
<div class="panel toolbar">
  <input class="search" id="searchInput" type="text" placeholder="ワード・英語・日本語・メモで検索..." />
  <button class="btn" id="clearBtn" type="button">クリア</button>
  <button class="btn" id="sortCatBtn" type="button">カテゴリ順</button>
  <button class="btn primary" id="sortDateBtn" type="button">新しい順</button>
  <span class="count" id="countLabel">表示件数: 0</span>
</div>

<!-- カテゴリチップ -->
<div class="panel">
  <div class="chips" id="categoryChips"></div>
</div>

<!-- カード一覧 -->
<div id="cardsContainer"></div>

<!-- サインインダイアログ -->
<dialog id="signinDialog">
  <div class="dialog-panel">
    <div class="dialog-header">
      <span class="dialog-title">サインイン / 新規登録</span>
      <button class="close-btn" id="closeSigninBtn" type="button">×</button>
    </div>
    <div class="field-group" style="margin-bottom:12px;">
      <label class="field-label" for="signinName">ユーザー名</label>
      <input class="input" id="signinName" type="text" placeholder="ゲーム内の名前など" />
    </div>
    <div class="field-group" style="margin-bottom:12px;">
      <label class="field-label" for="signinPass">パスワード</label>
      <input class="input" id="signinPass" type="password" placeholder="自分で決めたパスワード" />
    </div>
    <div class="field-group" style="margin-bottom:12px;">
      <label class="field-label" for="signinColor">表示カラー</label>
      <select class="select" id="signinColor">
        <option value="gray">グレー</option>
        <option value="blue">青系</option>
        <option value="green">緑系</option>
        <option value="pink">ピンク系</option>
      </select>
    </div>
    <p class="notice">※ 初回入力で自動登録されます。次回以降は同じ名前＋パスワードで認識されます。</p>
    <p id="signinError" class="error" style="margin-top:8px;font-size:0.85rem;"></p>
    <div class="form-actions">
      <button class="btn" id="closeSigninBtn2" type="button">キャンセル</button>
      <button class="btn primary" id="doSigninBtn" type="button">サインイン</button>
    </div>
  </div>
</dialog>

<!-- 編集ダイアログ -->
<dialog id="editDialog">
  <div class="dialog-panel">
    <div class="dialog-header">
      <span class="dialog-title">カードを編集</span>
      <button class="close-btn" id="closeEditBtn" type="button">×</button>
    </div>
    <div class="form-grid">
      <div class="field-group">
        <label class="field-label" for="editWord">ワード *</label>
        <input class="input" id="editWord" type="text" />
      </div>
      <div class="field-group">
        <label class="field-label" for="editTag">タグ</label>
        <select class="select" id="editTag">
          <option value="">選択してください</option>
          <option value="クエスト">クエスト</option>
          <option value="アイテム">アイテム</option>
          <option value="職業・ロール">職業・ロール</option>
          <option value="モンスター">モンスター</option>
          <option value="スキル">スキル</option>
          <option value="募集">募集</option>
          <option value="呼び名">呼び名</option>
          <option value="その他">その他</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="field-group">
        <label class="field-label" for="editEn">英語表記</label>
        <input class="input" id="editEn" type="text" />
      </div>
      <div class="field-group">
        <label class="field-label" for="editJp">日本語</label>
        <input class="input" id="editJp" type="text" />
      </div>
    </div>
    <div class="field-group" style="margin-bottom:12px;">
      <label class="field-label" for="editAlias">Alias / 別表記</label>
      <input class="input" id="editAlias" type="text" />
    </div>
    <div class="field-group" style="margin-bottom:12px;">
      <label class="field-label" for="editNote">メモ</label>
      <textarea class="textarea" id="editNote"></textarea>
    </div>
    <div class="anon-row" style="margin-bottom:8px;">
      <input type="checkbox" id="editAnonCheck" />
      <label for="editAnonCheck">「神秘的な冒険者」として表示</label>
    </div>
    <div class="form-actions">
      <button class="btn danger" id="deleteBtn" type="button">削除</button>
      <button class="btn" id="closeEditBtn2" type="button">キャンセル</button>
      <button class="btn primary" id="saveEditBtn" type="button">保存する</button>
    </div>
    <p id="editStatus" class="status"></p>
  </div>
</dialog>

<script>
const API_BASE = "https://app-079f3487.base44.app";
const ENTITIES_URL = `${API_BASE}/api/entities`;
const FUNC_URL = `${API_BASE}/functions/wordbookAuth`;
const APP_ID = "69fb952d64e717a2079f3487";

const CATEGORIES = ["クエスト","アイテム","職業・ロール","モンスター","スキル","募集","呼び名","その他"];
const ANON_NAME = "神秘的な冒険者";

let currentUser = null; // { user_id, username, display_color }
let allEntries = [];
let sortMode = "date"; // "date" | "category"
let activeCategory = "";
let searchQuery = "";
let editingId = null;

// ローカルセッション保存
function saveSession(user) {
  localStorage.setItem("roo_wordbook_session", JSON.stringify(user));
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem("roo_wordbook_session")); } catch { return null; }
}

// ---- API ----
async function apiGet(entity) {
  const res = await fetch(`${ENTITIES_URL}/${entity}`, {
    headers: { "x-app-id": APP_ID }
  });
  return res.json();
}
async function apiCreate(entity, data) {
  const res = await fetch(`${ENTITIES_URL}/${entity}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-app-id": APP_ID },
    body: JSON.stringify(data)
  });
  return res.json();
}
async function apiUpdate(entity, id, data) {
  const res = await fetch(`${ENTITIES_URL}/${entity}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "x-app-id": APP_ID },
    body: JSON.stringify(data)
  });
  return res.json();
}
async function apiDelete(entity, id) {
  const res = await fetch(`${ENTITIES_URL}/${entity}/${id}`, {
    method: "DELETE",
    headers: { "x-app-id": APP_ID }
  });
  return res.ok;
}

// ---- 認証 ----
async function doSignin() {
  const username = document.getElementById("signinName").value.trim();
  const password = document.getElementById("signinPass").value;
  const display_color = document.getElementById("signinColor").value;
  const errEl = document.getElementById("signinError");
  errEl.textContent = "";

  if (!username || !password) { errEl.textContent = "名前とパスワードを入力してください"; return; }

  // まず認証チェック
  const res = await fetch(FUNC_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();

  if (!res.ok) { errEl.textContent = data.error || "エラーが発生しました"; return; }

  if (data.is_new) {
    // 新規登録
    const res2 = await fetch(FUNC_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "register", username, password, display_color })
    });
    const data2 = await res2.json();
    if (!res2.ok) { errEl.textContent = data2.error || "登録に失敗しました"; return; }
    currentUser = { user_id: data2.user_id, username: data2.username, display_color: data2.display_color };
  } else {
    currentUser = { user_id: data.user_id, username: data.username, display_color: data.display_color };
  }

  saveSession(currentUser);
  document.getElementById("signinDialog").close();
  updateUserBar();
}

function updateUserBar() {
  const bar = document.getElementById("userBar");
  const statusEl = document.getElementById("userStatus");
  const signinBtn = document.getElementById("signinBtn");
  const form = document.getElementById("entryForm");

  if (currentUser) {
    statusEl.innerHTML = `サインイン中: <span class="author-tag author-${currentUser.display_color}">${currentUser.username}</span>`;
    signinBtn.textContent = "サインアウト";
    signinBtn.onclick = () => {
      currentUser = null;
      localStorage.removeItem("roo_wordbook_session");
      updateUserBar();
    };
    form.style.display = "";
  } else {
    statusEl.textContent = "投稿・編集するにはサインインしてください";
    signinBtn.textContent = "サインイン / 新規登録";
    signinBtn.onclick = () => document.getElementById("signinDialog").showModal();
    form.style.display = "none";
  }
}

// ---- エントリ読み込み ----
async function loadEntries() {
  const data = await apiGet("WordbookEntry");
  allEntries = Array.isArray(data) ? data : (data.data || []);
  render();
}

// ---- 検索・フィルタ ----
function filterEntries() {
  let list = [...allEntries];
  if (activeCategory) list = list.filter(e => e.tag === activeCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(e =>
      (e.word||"").toLowerCase().includes(q) ||
      (e.en||"").toLowerCase().includes(q) ||
      (e.jp||"").toLowerCase().includes(q) ||
      (e.alias||"").toLowerCase().includes(q) ||
      (e.note||"").toLowerCase().includes(q) ||
      (e.author_display||"").toLowerCase().includes(q)
    );
  }
  return list;
}

function sortEntries(list) {
  if (sortMode === "date") {
    return list.sort((a, b) => new Date(b.created_date) - new Date(a.created_date));
  } else {
    return list.sort((a, b) => {
      const ai = CATEGORIES.indexOf(a.tag), bi = CATEGORIES.indexOf(b.tag);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
  }
}

// ---- レンダリング ----
function render() {
  const filtered = filterEntries();
  const sorted = sortEntries(filtered);
  document.getElementById("countLabel").textContent = `表示件数: ${sorted.length}`;

  // カテゴリチップ
  const chips = document.getElementById("categoryChips");
  chips.innerHTML = "";
  const allChip = Object.assign(document.createElement("button"), { className: "chip" + (!activeCategory ? " active" : ""), textContent: "すべて" });
  allChip.onclick = () => { activeCategory = ""; render(); };
  chips.appendChild(allChip);
  CATEGORIES.forEach(cat => {
    const count = allEntries.filter(e => e.tag === cat).length;
    if (count === 0) return;
    const chip = Object.assign(document.createElement("button"), { className: "chip" + (activeCategory === cat ? " active" : ""), textContent: `${cat} (${count})` });
    chip.onclick = () => { activeCategory = cat; render(); };
    chips.appendChild(chip);
  });

  // カード一覧
  const container = document.getElementById("cardsContainer");
  container.innerHTML = "";

  if (sorted.length === 0) {
    container.innerHTML = "<p style='color:#aaa;text-align:center;margin:32px 0;'>該当するカードがありません</p>";
    return;
  }

  if (sortMode === "category") {
    CATEGORIES.forEach(cat => {
      const cards = sorted.filter(e => e.tag === cat);
      if (cards.length === 0) return;
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = cat;
      container.appendChild(title);
      const cardsList = document.createElement("div");
      cardsList.className = "cards";
      cards.forEach(e => cardsList.appendChild(makeCard(e)));
      container.appendChild(cardsList);
    });
    const uncats = sorted.filter(e => !e.tag || !CATEGORIES.includes(e.tag));
    if (uncats.length) {
      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = "未分類";
      container.appendChild(title);
      const cardsList = document.createElement("div");
      cardsList.className = "cards";
      uncats.forEach(e => cardsList.appendChild(makeCard(e)));
      container.appendChild(cardsList);
    }
  } else {
    const cardsList = document.createElement("div");
    cardsList.className = "cards";
    sorted.forEach(e => cardsList.appendChild(makeCard(e)));
    container.appendChild(cardsList);
  }
}

function makeCard(entry) {
  const card = document.createElement("div");
  card.className = "card";

  const canEdit = currentUser && (currentUser.user_id === entry.author_username);

  const displayAuthor = entry.is_anonymous ? ANON_NAME : (entry.author_display || entry.author_username || "?");
  const colorClass = entry.is_anonymous ? "author-gray" : `author-${entry.display_color || "gray"}`;

  const date = new Date(entry.created_date).toLocaleDateString("ja-JP");

  card.innerHTML = `
    <div class="card-header">
      <span class="card-word">${esc(entry.word || "")}</span>
      ${entry.tag ? `<span class="card-tag">${esc(entry.tag)}</span>` : ""}
    </div>
    <div class="card-body">
      ${entry.en ? `<div><span>英語：</span>${esc(entry.en)}</div>` : ""}
      ${entry.jp ? `<div><span>日本語：</span>${esc(entry.jp)}</div>` : ""}
      ${entry.alias ? `<div><span>別表記：</span>${esc(entry.alias)}</div>` : ""}
    </div>
    ${entry.note ? `<div class="card-note">${esc(entry.note)}</div>` : ""}
    <div class="card-footer">
      <span class="card-meta">
        <span class="author-tag ${colorClass}">${esc(displayAuthor)}</span>
        　${date}
      </span>
      ${canEdit ? `<div class="card-actions"><button class="btn" data-id="${entry.id}" data-action="edit">編集</button></div>` : ""}
    </div>
  `;

  if (canEdit) {
    card.querySelector("[data-action='edit']").onclick = () => openEdit(entry);
  }
  return card;
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ---- 追加 ----
document.getElementById("addBtn").onclick = async () => {
  if (!currentUser) return;
  const word = document.getElementById("wordInput").value.trim();
  if (!word) { document.getElementById("addStatus").textContent = "ワードを入力してください"; return; }

  const isAnon = document.getElementById("anonCheck").checked;
  const data = {
    word,
    tag: document.getElementById("tagInput").value,
    en: document.getElementById("enInput").value.trim(),
    jp: document.getElementById("jpInput").value.trim(),
    alias: document.getElementById("aliasInput").value.trim(),
    note: document.getElementById("noteInput").value.trim(),
    author_username: currentUser.user_id,
    author_display: currentUser.username,
    display_color: currentUser.display_color,
    is_anonymous: isAnon
  };

  document.getElementById("addStatus").textContent = "追加中...";
  const result = await apiCreate("WordbookEntry", data);
  if (result.id) {
    document.getElementById("addStatus").textContent = "追加しました！";
    ["wordInput","enInput","jpInput","aliasInput","noteInput"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("tagInput").value = "";
    document.getElementById("anonCheck").checked = false;
    await loadEntries();
  } else {
    document.getElementById("addStatus").textContent = "エラーが発生しました";
  }
};

// ---- 編集 ----
function openEdit(entry) {
  editingId = entry.id;
  document.getElementById("editWord").value = entry.word || "";
  document.getElementById("editTag").value = entry.tag || "";
  document.getElementById("editEn").value = entry.en || "";
  document.getElementById("editJp").value = entry.jp || "";
  document.getElementById("editAlias").value = entry.alias || "";
  document.getElementById("editNote").value = entry.note || "";
  document.getElementById("editAnonCheck").checked = !!entry.is_anonymous;
  document.getElementById("editStatus").textContent = "";
  document.getElementById("editDialog").showModal();
}

document.getElementById("saveEditBtn").onclick = async () => {
  if (!editingId || !currentUser) return;
  const word = document.getElementById("editWord").value.trim();
  if (!word) { document.getElementById("editStatus").textContent = "ワードを入力してください"; return; }

  const isAnon = document.getElementById("editAnonCheck").checked;
  const data = {
    word,
    tag: document.getElementById("editTag").value,
    en: document.getElementById("editEn").value.trim(),
    jp: document.getElementById("editJp").value.trim(),
    alias: document.getElementById("editAlias").value.trim(),
    note: document.getElementById("editNote").value.trim(),
    is_anonymous: isAnon
  };

  document.getElementById("editStatus").textContent = "保存中...";
  const result = await apiUpdate("WordbookEntry", editingId, data);
  if (result.id) {
    document.getElementById("editDialog").close();
    await loadEntries();
  } else {
    document.getElementById("editStatus").textContent = "エラーが発生しました";
  }
};

document.getElementById("deleteBtn").onclick = async () => {
  if (!editingId || !currentUser) return;
  if (!confirm("このカードを削除しますか？")) return;
  const ok = await apiDelete("WordbookEntry", editingId);
  if (ok) {
    document.getElementById("editDialog").close();
    await loadEntries();
  }
};

// ---- ダイアログ閉じる ----
["closeEditBtn","closeEditBtn2"].forEach(id => {
  document.getElementById(id).onclick = () => document.getElementById("editDialog").close();
});
["closeSigninBtn","closeSigninBtn2"].forEach(id => {
  document.getElementById(id).onclick = () => document.getElementById("signinDialog").close();
});
document.getElementById("doSigninBtn").onclick = doSignin;

// ---- 検索・ソート ----
document.getElementById("searchInput").oninput = (e) => { searchQuery = e.target.value; render(); };
document.getElementById("clearBtn").onclick = () => { searchQuery = ""; document.getElementById("searchInput").value = ""; render(); };
document.getElementById("sortCatBtn").onclick = () => { sortMode = "category"; render(); };
document.getElementById("sortDateBtn").onclick = () => { sortMode = "date"; render(); };

// ---- 初期化 ----
currentUser = loadSession();
updateUserBar();
loadEntries();
</script>
</body>
</html>
